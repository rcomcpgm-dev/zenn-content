name: Process Tweet Queue

on:
  schedule:
    # 毎時 17分・47分 (UTC) — ピーク(0/30分)を避けて遅延軽減
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Process scheduled queue
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node process-queue.js

      - name: Commit queue changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scheduled-queue.json tweet-history.txt
          if ! git diff --staged --quiet; then
            git commit -m "予約投稿キュー処理"
            git pull --rebase
            git push
          fi
