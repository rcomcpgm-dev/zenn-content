name: Auto Publish Articles

on:
  schedule:
    # 毎日日本時間10:00（UTC 01:00）に実行
    - cron: '0 1 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Find and publish one unpublished article
        id: publish
        run: |
          # 未公開記事を1つ見つけてpublishedをtrueに変更
          FILE=$(grep -rl 'published: false' articles/ | head -1)

          if [ -z "$FILE" ]; then
            echo "No unpublished articles found."
            echo "published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Publishing: $FILE"
          sed -i 's/published: false/published: true/' "$FILE"

          echo "published=true" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Auto-publish: $(basename $FILE .md)"
          git push

      - name: Post to X
        if: steps.publish.outputs.published == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          TWEET=$(node generate-tweet.js "${{ steps.publish.outputs.file }}")
          node post-to-x.js "$TWEET"
