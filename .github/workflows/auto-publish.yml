name: Auto Publish Articles

on:
  schedule:
    # 毎日日本時間10:03（UTC 01:03）に実行
    - cron: '3 1 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Find and publish one unpublished article
        id: publish
        run: |
          # 未公開記事をpublish_order順で1つ見つけてpublishedをtrueに変更
          # publish_orderがある記事を番号順に、ない記事はその後にファイル名順で処理
          FILE=$(for f in articles/*.md; do
            if grep -q 'published: false' "$f"; then
              order=$(grep 'publish_order:' "$f" | sed 's/[^0-9]//g')
              echo "${order:-9999} $f"
            fi
          done | sort -n | head -1 | cut -d' ' -f2)

          if [ -z "$FILE" ]; then
            echo "No unpublished articles found."
            echo "published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Publishing: $FILE"
          sed -i 's/published: false/published: true/' "$FILE"

          echo "published=true" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Auto-publish: $(basename $FILE .md)"
          git pull --rebase
          git push

      - name: Verify article is live on Zenn
        if: steps.publish.outputs.published == 'true'
        id: verify
        run: |
          SLUG=$(basename "${{ steps.publish.outputs.file }}" .md)
          URL="https://zenn.dev/rcn_article/articles/${SLUG}"
          echo "Checking: $URL"

          # Zennのデプロイを待つ（最大3分、30秒間隔で6回）
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "verified=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 30
          done

          echo "Article not live on Zenn after 3 minutes. Skipping tweet."
          echo "verified=false" >> $GITHUB_OUTPUT

      - name: Post to X
        if: steps.verify.outputs.verified == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          TWEET=$(node generate-tweet.js "${{ steps.publish.outputs.file }}")
          node post-to-x.js "$TWEET"
