name: Auto Publish Articles

on:
  schedule:
    # 毎日日本時間10:03（UTC 01:03）に実行
    - cron: '3 1 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Find and publish up to 5 unpublished articles
        id: publish
        run: |
          # 未公開記事をpublish_order順で最大5つ見つけてpublishedをtrueに変更
          FILES=$(for f in articles/*.md; do
            if grep -q 'published: false' "$f"; then
              order=$(grep 'publish_order:' "$f" | sed 's/[^0-9]//g')
              echo "${order:-9999} $f"
            fi
          done | sort -n | head -5 | cut -d' ' -f2)

          if [ -z "$FILES" ]; then
            echo "No unpublished articles found."
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          COUNT=0
          PUBLISHED_FILES=""
          for FILE in $FILES; do
            echo "Publishing: $FILE"
            sed -i 's/published: false/published: true/' "$FILE"
            PUBLISHED_FILES="$PUBLISHED_FILES $FILE"
            COUNT=$((COUNT + 1))
          done

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "files=$PUBLISHED_FILES" >> $GITHUB_OUTPUT

          # 最後に公開した記事のファイル名（ツイート用）
          LAST_FILE=$(echo "$FILES" | tail -1)
          echo "last_file=$LAST_FILE" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/*.md
          git commit -m "Auto-publish: ${COUNT}記事を公開"
          git pull --rebase
          git push

      - name: Wait for Zenn deploy
        if: steps.publish.outputs.count != '0'
        run: |
          echo "Waiting 90 seconds for Zenn to deploy..."
          sleep 90

      - name: Verify articles are live on Zenn
        if: steps.publish.outputs.count != '0'
        id: verify
        run: |
          VERIFIED=0
          for FILE in ${{ steps.publish.outputs.files }}; do
            SLUG=$(basename "$FILE" .md)
            URL="https://zenn.dev/rcn_article/articles/${SLUG}"

            for i in 1 2 3 4; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
              echo "$SLUG: attempt $i → HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                VERIFIED=$((VERIFIED + 1))
                break
              fi
              sleep 30
            done
          done

          echo "verified=$VERIFIED" >> $GITHUB_OUTPUT
          echo "$VERIFIED / ${{ steps.publish.outputs.count }} articles verified on Zenn"

      - name: Post to X (last published article)
        if: steps.verify.outputs.verified != '0'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          TWEET=$(node generate-tweet.js "${{ steps.publish.outputs.last_file }}")
          node post-to-x.js "$TWEET"
