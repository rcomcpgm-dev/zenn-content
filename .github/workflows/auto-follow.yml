name: Auto Follow Claude Code Community

on:
  schedule:
    # 毎週月曜・木曜 21:00 JST (UTC 12:00)
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-follow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Search and follow
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node auto-follow.js

      - name: Save followed users
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add followed-users.json
          git diff --staged --quiet || git commit -m "Update followed users list" && git push
