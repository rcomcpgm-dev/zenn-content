name: Scheduled Tweets

on:
  schedule:
    # 朝 7:30 JST (UTC 22:30 前日)
    - cron: '30 22 * * *'
    # 昼 12:15 JST (UTC 03:15)
    - cron: '15 3 * * *'
    # 夜 19:00 JST (UTC 10:00)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Tweet category (tips/mindset/learning/article/devlog/industry/engagement)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Determine category by time slot
        id: category
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "${{ github.event.inputs.category }}" != "" ]; then
            echo "cat=${{ github.event.inputs.category }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -lt 10 ]; then
            # 朝: Tips or Learning (実用系)
            echo "cat=$(shuf -e tips learning -n 1)" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -lt 15 ]; then
            # 昼: Article or Industry (読み応え系)
            echo "cat=$(shuf -e article industry -n 1)" >> $GITHUB_OUTPUT
          else
            # 夜: Mindset, Devlog (共感系)
            echo "cat=$(shuf -e mindset devlog -n 1)" >> $GITHUB_OUTPUT
          fi

      - name: Post tweet
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          node scheduled-post.js "${{ steps.category.outputs.cat }}"

      - name: Save posted IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted-ids.json
          git diff --staged --quiet || git commit -m "Update posted tweet IDs" && git push
