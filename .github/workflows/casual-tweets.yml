name: Casual Tweets

on:
  schedule:
    # 昼 12:00 JST (UTC 03:00) — 昼休み開始
    - cron: '0 3 * * *'
    # 夜 19:30 JST (UTC 10:30) — 帰宅時間帯
    - cron: '30 10 * * *'
    # 夜 21:30 JST (UTC 12:30) — ゴールデンタイム
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  casual-tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate and post casual tweet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node casual-tweet.js

      - name: Save tweet log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add casual-tweet-log.json tweet-history.txt
          if ! git diff --staged --quiet; then
            git commit -m "Update casual tweet log"
            git pull --rebase
            git push
          fi
