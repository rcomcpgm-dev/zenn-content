name: Casual Tweets

on:
  schedule:
    # 朝 8:00 JST (UTC 23:00 前日)
    - cron: '0 23 * * *'
    # 昼 12:30 JST (UTC 03:30)
    - cron: '30 3 * * *'
    # 夜 20:30 JST (UTC 11:30)
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  casual-tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate and post casual tweet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node casual-tweet.js

      - name: Save tweet log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add casual-tweet-log.json
          git diff --staged --quiet || git commit -m "Update casual tweet log" && git push
